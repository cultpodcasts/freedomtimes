  <desc id="desc">Dedicated social sharing image for Freedom Times homepage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2f27" />
      <stop offset="100%" stop-color="#1d4b3e" />
