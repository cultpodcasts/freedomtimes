name: Terraform – Production

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - "web/**"
      - ".github/workflows/terraform-production.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: ${{ github.event_name == 'push' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/environments/production

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_cloudflare_api_token: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
      TF_VAR_azure_location: ${{ vars.TF_VAR_AZURE_LOCATION }}
      TF_VAR_route_pattern: ${{ vars.TF_VAR_ROUTE_PATTERN }}
      TF_VAR_worker_name: ${{ vars.TF_VAR_WORKER_NAME }}
      TF_VAR_holding_title: ${{ vars.TF_VAR_HOLDING_TITLE }}
      TF_VAR_holding_heading: ${{ vars.TF_VAR_HOLDING_HEADING }}
      TF_VAR_holding_message: ${{ vars.TF_VAR_HOLDING_MESSAGE }}
      TF_VAR_build_revision: ${{ github.sha }}
      TF_VAR_contact_email: ""
      TF_VAR_manage_apex_dns_record: ${{ vars.TF_VAR_MANAGE_APEX_DNS_RECORD_PRODUCTION }}
      TF_VAR_apex_dns_record_content: ${{ vars.TF_VAR_APEX_DNS_RECORD_CONTENT_PRODUCTION }}
      TF_VAR_api_custom_hostname: ${{ vars.TF_VAR_API_CUSTOM_HOSTNAME_PRODUCTION }}
      TF_VAR_api_custom_hostname_certificate_base64: ${{ secrets.TF_VAR_API_CUSTOM_HOSTNAME_CERTIFICATE_BASE64_PRODUCTION }}
      TF_VAR_api_custom_hostname_certificate_password: ${{ secrets.TF_VAR_API_CUSTOM_HOSTNAME_CERTIFICATE_PASSWORD_PRODUCTION }}
      CERT_SECRETS_CONFIGURED: ${{ secrets.TF_VAR_API_CUSTOM_HOSTNAME_CERTIFICATE_BASE64_PRODUCTION != '' && secrets.TF_VAR_API_CUSTOM_HOSTNAME_CERTIFICATE_PASSWORD_PRODUCTION != '' }}
      TF_VAR_workspace_url: ${{ vars.TF_VAR_WORKSPACE_URL_PRODUCTION }}
      TF_VAR_auth0_api_identifier: ${{ vars.AUTH0_API_AUDIENCE_PRODUCTION }}
      TF_VAR_extra_workspace_urls: ${{ vars.TF_VAR_EXTRA_WORKSPACE_URLS_PRODUCTION }}
      TF_VAR_auth0_domain: ${{ secrets.TF_VAR_AUTH0_DOMAIN }}
      TF_VAR_auth0_client_id: ${{ secrets.TF_VAR_AUTH0_CLIENT_ID }}
      TF_VAR_auth0_client_secret: ${{ secrets.TF_VAR_AUTH0_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -lock-timeout=5m -no-color -out=tfplan
          PLAN_EXIT=$?
          set -e
          if [ "$PLAN_EXIT" -eq 1 ]; then
            echo "terraform plan failed with exit code 1"
            exit 1
          fi
          echo "terraform plan exit code: $PLAN_EXIT"
        continue-on-error: false

      - name: Post plan to PR
        if: github.event_name == 'pull_request' && env.CERT_SECRETS_CONFIGURED != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = require('child_process')
              .execSync('terraform show -no-color tfplan', { cwd: 'infra/terraform/environments/production' })
              .toString();
            const body = `### Terraform Plan – Production\n\`\`\`\n${plan.substring(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Terraform Apply
        if: false
        run: terraform apply -lock-timeout=5m tfplan

      - name: Cleanup Terraform Plan File
        if: always()
        run: rm -f tfplan

      - name: Setup Node
        if: false
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Web Dependencies
        if: false
        working-directory: web
        run: npm ci

      - name: Build Astro Worker
        if: false
        working-directory: web
        run: npm run build

      - name: Deploy Astro Worker to Production
        if: false
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          AUTH0_API_AUDIENCE: ${{ vars.AUTH0_API_AUDIENCE_PRODUCTION }}
          API_BASE_URL: ${{ vars.API_BASE_URL_PRODUCTION }}
          COOKIE_BASE_DOMAIN: ${{ vars.COOKIE_BASE_DOMAIN_PRODUCTION }}
          AUTH0_ROLES_CLAIM_NAMESPACE: ${{ vars.AUTH0_ROLES_CLAIM_NAMESPACE_PRODUCTION }}
          API_UPSTREAM_MODE: ${{ vars.API_UPSTREAM_MODE_PRODUCTION }}
        run: >
          npx wrangler deploy --config wrangler.production.jsonc
          --var AUTH0_API_AUDIENCE:$AUTH0_API_AUDIENCE
          --var API_BASE_URL:$API_BASE_URL
          --var COOKIE_BASE_DOMAIN:$COOKIE_BASE_DOMAIN
          --var AUTH0_ROLES_CLAIM_NAMESPACE:$AUTH0_ROLES_CLAIM_NAMESPACE
          --var API_UPSTREAM_MODE:$API_UPSTREAM_MODE

      - name: Set Worker Secrets for Production
        if: false
        working-directory: web
        # Cloudflare Worker secrets are synced here from GitHub secrets.
        # GitHub secrets are populated by scripts/set-github-secrets.ps1, which reads from .env.production.
        # Canonical source: .env.production → (script syncs to) → GitHub secrets → (workflow reads) → Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          AUTH0_DOMAIN_VALUE: ${{ secrets.TF_VAR_AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID_VALUE: ${{ secrets.AUTH0_LOGIN_APP_CLIENT_ID_PRODUCTION }}
          AUTH0_CLIENT_SECRET_VALUE: ${{ secrets.AUTH0_LOGIN_APP_CLIENT_SECRET_PRODUCTION }}
        run: |
          printf '%s' "$AUTH0_DOMAIN_VALUE" | npx wrangler secret put AUTH0_DOMAIN --config wrangler.production.jsonc
          printf '%s' "$AUTH0_CLIENT_ID_VALUE" | npx wrangler secret put AUTH0_CLIENT_ID --config wrangler.production.jsonc
          printf '%s' "$AUTH0_CLIENT_SECRET_VALUE" | npx wrangler secret put AUTH0_CLIENT_SECRET --config wrangler.production.jsonc
