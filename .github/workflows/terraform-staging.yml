name: Terraform - Staging

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  terraform:
    name: "Apply to Staging"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/environments/staging

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
      TF_VAR_cloudflare_api_token: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
      TF_VAR_route_pattern: "staging.freedomtimes.news/*"
      TF_VAR_worker_name: "freedomtimes-holding-staging"
      TF_VAR_manage_apex_dns_record: "false"
      TF_VAR_apex_dns_record_content: "192.0.2.1"
      TF_VAR_auth0_domain: ${{ secrets.TF_VAR_AUTH0_DOMAIN }}
      TF_VAR_auth0_client_id: ${{ secrets.TF_VAR_AUTH0_CLIENT_ID }}
      TF_VAR_auth0_client_secret: ${{ secrets.TF_VAR_AUTH0_CLIENT_SECRET }}
      TF_VAR_auth0_action_client_id: ${{ secrets.TF_VAR_AUTH0_ACTION_CLIENT_ID }}
      TF_VAR_auth0_action_client_secret: ${{ secrets.TF_VAR_AUTH0_ACTION_CLIENT_SECRET }}
      TF_VAR_auth0_app_client_secret: ${{ secrets.AUTH0_APP_CLIENT_SECRET_STAGING }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: false

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const plan = require('child_process')
              .execSync('terraform show -no-color tfplan', { cwd: 'infra/terraform/environments/staging' })
              .toString();
            const body = `### Terraform Plan - Staging\n\`\`\`\n${plan.substring(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Terraform Apply
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        run: terraform apply tfplan

      - name: Capture Auth0 App Client ID
        run: |
          AUTH0_APP_CLIENT_ID=$(terraform output -raw auth0_app_client_id)
          if [ -z "$AUTH0_APP_CLIENT_ID" ]; then
            echo "auth0_app_client_id output is empty"
            exit 1
          fi
          echo "AUTH0_APP_CLIENT_ID=$AUTH0_APP_CLIENT_ID" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Web Dependencies
        working-directory: web
        run: npm ci

      - name: Build Astro Worker
        working-directory: web
        run: npm run build

      - name: Deploy Astro Worker to Staging
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          AUTH0_DOMAIN: ${{ secrets.TF_VAR_AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ env.AUTH0_APP_CLIENT_ID }}
        run: >
          npx wrangler deploy --config wrangler.staging.toml
          --var AUTH0_DOMAIN:$AUTH0_DOMAIN
          --var AUTH0_CLIENT_ID:$AUTH0_CLIENT_ID
