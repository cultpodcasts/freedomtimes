name: Terraform - Staging

on:
  push:
    branches: [feat/11-editorial-api-cosmos]
    paths:
      - "infra/terraform/**"
      - "functions/editorial-api/**"
      - "web/**"
      - ".github/workflows/terraform-staging.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      staging_terraform_apply:
        description: "Run Terraform apply (true) or plan-only (false)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  STAGING_TERRAFORM_APPLY: "true"

jobs:
  terraform:
    name: "Apply to Staging"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/environments/staging

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_cloudflare_api_token: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
      TF_VAR_azure_location: "uksouth"
      TF_VAR_route_pattern: "staging.freedomtimes.news/*"
      TF_VAR_worker_name: "freedomtimes-holding-staging"
      TF_VAR_manage_apex_dns_record: "false"
      TF_VAR_apex_dns_record_content: "192.0.2.1"
      TF_VAR_api_custom_hostname: "api-staging.freedomtimes.news"
      TF_VAR_api_custom_hostname_certificate_base64: ${{ secrets.TF_VAR_API_CUSTOM_HOSTNAME_CERTIFICATE_BASE64_STAGING }}
      TF_VAR_api_custom_hostname_certificate_password: ${{ secrets.TF_VAR_API_CUSTOM_HOSTNAME_CERTIFICATE_PASSWORD_STAGING }}
      CERT_SECRETS_CONFIGURED: ${{ secrets.TF_VAR_API_CUSTOM_HOSTNAME_CERTIFICATE_BASE64_STAGING != '' && secrets.TF_VAR_API_CUSTOM_HOSTNAME_CERTIFICATE_PASSWORD_STAGING != '' }}
      TF_VAR_auth0_domain: ${{ secrets.TF_VAR_AUTH0_DOMAIN }}
      TF_VAR_auth0_client_id: ${{ secrets.TF_VAR_AUTH0_CLIENT_ID }}
      TF_VAR_auth0_client_secret: ${{ secrets.TF_VAR_AUTH0_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        timeout-minutes: 20
        run: |
          echo "Starting terraform plan (non-interactive) with heartbeat logging..."
          set +e
          timeout 12m terraform plan -input=false -lock-timeout=5m -no-color -detailed-exitcode -out=tfplan > plan.log 2>&1 &
          PLAN_PID=$!

          while kill -0 "$PLAN_PID" 2>/dev/null; do
            echo "[plan-heartbeat] $(date -u +"%Y-%m-%dT%H:%M:%SZ") terraform plan still running"
            tail -n 20 plan.log || true
            sleep 30
          done

          wait "$PLAN_PID"
          PLAN_EXIT=$?
          set -e

          echo "--- terraform plan output ---"
          cat plan.log

          if [ "$PLAN_EXIT" -eq 124 ]; then
            echo "terraform plan timed out after 12 minutes"
            exit 1
          fi

          if [ "$PLAN_EXIT" -eq 1 ]; then
            echo "terraform plan failed with exit code 1"
            exit 1
          fi
          if [ "$PLAN_EXIT" -eq 0 ]; then
            echo "terraform plan completed: no changes"
          elif [ "$PLAN_EXIT" -eq 2 ]; then
            echo "terraform plan completed: changes detected"
          else
            echo "terraform plan returned unexpected exit code: $PLAN_EXIT"
            exit "$PLAN_EXIT"
          fi
        continue-on-error: false

      - name: Post plan to PR
        if: github.event_name == 'pull_request' && env.CERT_SECRETS_CONFIGURED != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const plan = require('child_process')
              .execSync('terraform show -no-color tfplan', { cwd: 'infra/terraform/environments/staging' })
              .toString();
            const body = `### Terraform Plan - Staging\n\`\`\`\n${plan.substring(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Terraform Apply
        if: (env.STAGING_TERRAFORM_APPLY == 'true') || (github.event_name == 'workflow_dispatch' && github.event.inputs.staging_terraform_apply == 'true')
        run: terraform apply -lock-timeout=5m tfplan

      - name: Capture Terraform Outputs
        id: tf_outputs
        run: |
          echo "api_base_url=$(terraform output -raw azure_editorial_api_public_base_url)" >> $GITHUB_OUTPUT
          echo "function_app_name=$(terraform output -raw azure_function_app_name)" >> $GITHUB_OUTPUT

      - name: Cleanup Terraform Plan File
        if: always()
        run: rm -f tfplan

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            web/package-lock.json
            functions/editorial-api/package-lock.json

      - name: Install Function App Dependencies
        working-directory: functions/editorial-api
        run: npm ci

      - name: Azure Login for Function Deploy
        uses: azure/login@v2
        with:
          creds: >-
            {"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}

      - name: Deploy Stub Azure Function App to Staging
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.tf_outputs.outputs.function_app_name }}
          package: ./functions/editorial-api
          remote-build: true
          respect-funcignore: true

      - name: Install Web Dependencies
        working-directory: web
        run: npm ci

      - name: Build Astro Worker
        working-directory: web
        run: npm run build

      - name: Deploy Astro Worker to Staging
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          AUTH0_API_AUDIENCE: "https://api.freedomtimes.news"
          API_BASE_URL: ${{ steps.tf_outputs.outputs.api_base_url }}
        run: >
          npx wrangler deploy --config wrangler.staging.jsonc
          --var AUTH0_API_AUDIENCE:$AUTH0_API_AUDIENCE
          --var API_BASE_URL:$API_BASE_URL

      - name: Set Worker Secrets for Staging
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          AUTH0_DOMAIN_VALUE: ${{ secrets.TF_VAR_AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID_VALUE: ${{ secrets.AUTH0_LOGIN_APP_CLIENT_ID_STAGING }}
          AUTH0_CLIENT_SECRET_VALUE: ${{ secrets.AUTH0_LOGIN_APP_CLIENT_SECRET_STAGING }}
        run: |
          printf '%s' "$AUTH0_DOMAIN_VALUE" | npx wrangler secret put AUTH0_DOMAIN --config wrangler.staging.jsonc
          printf '%s' "$AUTH0_CLIENT_ID_VALUE" | npx wrangler secret put AUTH0_CLIENT_ID --config wrangler.staging.jsonc
          printf '%s' "$AUTH0_CLIENT_SECRET_VALUE" | npx wrangler secret put AUTH0_CLIENT_SECRET --config wrangler.staging.jsonc
